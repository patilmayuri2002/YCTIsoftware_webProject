<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logout</title>

<style>

body{
font-family: Arial;
background:#f3f0ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.logout-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
border-top:5px solid #7b3fe4;
}

h2{
color:#7b3fe4;
}

button{
margin-top:20px;
padding:10px 20px;
background:#7b3fe4;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#5e2ec4;
}

</style>

</head>

<body>

<div class="logout-box">

<h2>You have successfully logged out</h2>

<a href="login.html">
<button>Login Again</button>
</a>

</div>

</body>
</html>
