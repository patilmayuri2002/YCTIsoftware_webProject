<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<style>

body{
font-family: Arial;
background-image: url("img2.jpg");
background-size: cover;
background-position: center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.profile-card{
background:white;
width:350px;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
border-top:5px solid #7b3fe4;
}

.profile-img{
width:100px;
height:100px;
border-radius:50%;
margin-bottom:15px;
}

h2{
color:#7b3fe4;
margin-bottom:10px;
}

.info{
text-align:left;
margin-top:20px;
}

.info p{
margin:8px 0;
}

button{
margin-top:20px;
padding:10px 20px;
background:#7b3fe4;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#5e2ec4;
}

</style>
</head>

<body>

<div class="profile-card">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-img">

<h2>User Profile</h2>

<div class="info">

<p><b>Name:</b> Sujata</p>
<p><b>Email:</b> sujata@gmail.com</p>
<p><b>Role:</b> DevOps Monitoring Engineer</p>

</div>

<a href="logout.html">
<button>Logout</button>
</a>

</div>

</body>
</html>
